<svg width="100%" viewBox="0 0 680 240" role="img" xmlns="http://www.w3.org/2000/svg">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Insuro insurance company logo</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Minimalist logo for Insuro with shield on the left and wordmark with Slovenian tagline on the right</desc>

  

  <!-- Shield (left side, vertically centered) -->
  <g transform="translate(138, 20) scale(0.88)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <!-- Outer shield -->
    <path d="M100 0 L196 36 L196 108 Q196 172 100 210 Q4 172 4 108 L4 36 Z" fill="#2e7d52" style="fill:rgb(46, 125, 82);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Inner shield highlight -->
    <path d="M100 14 L182 44 L182 110 Q182 164 100 196 Q18 164 18 110 L18 44 Z" fill="#3a9e68" style="fill:rgb(58, 158, 104);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Left leaf petal -->
    <path d="M100 80 Q68 68 58 96 Q64 118 100 124 Z" fill="#a8edca" opacity="0.92" style="fill:rgb(168, 237, 202);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.92;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Right leaf petal -->
    <path d="M100 80 Q132 68 142 96 Q136 118 100 124 Z" fill="#7ee3ae" opacity="0.92" style="fill:rgb(126, 227, 174);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.92;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Center stem -->
    <line x1="100" y1="80" x2="100" y2="148" stroke="#c8f5de" stroke-width="3" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(200, 245, 222);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Small left branch -->
    <line x1="100" y1="118" x2="82" y2="104" stroke="#c8f5de" stroke-width="2" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(200, 245, 222);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Small right branch -->
    <line x1="100" y1="118" x2="118" y2="104" stroke="#c8f5de" stroke-width="2" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(200, 245, 222);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>

  <!-- Vertical divider -->
  <line x1="318" y1="48" x2="318" y2="192" stroke="#2e7d52" stroke-width="1" opacity="0.25" style="fill:rgb(0, 0, 0);stroke:rgb(46, 125, 82);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.25;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Right side: wordmark + tagline -->
  <!-- Wordmark -->
  <text x="346" y="138" font-size="64" font-weight="300" letter-spacing="12" text-anchor="start" style="fill:rgb(240, 250, 244);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:-apple-system, &quot;Helvetica Neue&quot;, sans-serif;font-size:64px;font-weight:300;text-anchor:start;dominant-baseline:auto">INSURO</text>

  <!-- Green accent line -->
  <rect x="346" y="152" width="220" height="1.5" rx="1" fill="#2e7d52" opacity="0.4" style="fill:rgb(46, 125, 82);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Tagline in Slovenian -->
  <text x="348" y="174" font-size="12.5" font-weight="400" letter-spacing="3.5" text-anchor="start" style="fill:rgb(109, 191, 138);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:-apple-system, &quot;Helvetica Neue&quot;, sans-serif;font-size:12.5px;font-weight:400;text-anchor:start;dominant-baseline:auto">ZAŠČITITE, KAR JE VAŽNO</text>
</svg>